name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/monitor/pnpm-lock.yaml

      - name: Build monitor UI
        run: |
          pnpm --dir web/monitor install --frozen-lockfile
          pnpm --dir web/monitor build

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            for bin in singbox-deploy singbox-monitor singbox-node; do
              CGO_ENABLED=0 GOOS=linux GOARCH=${arch} \
                go build -trimpath \
                -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
                -o dist/${bin}-linux-${arch} ./cmd/${bin}
            done
          done
          cp scripts/install.sh dist/install.sh

      - name: Check if first release
        id: check
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          echo "is_first=$([ -z "$PREV_TAG" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        if: steps.check.outputs.is_first == 'true'
        with:
          body: "Initial release of singbox-deploy."
          files: dist/*

      - uses: softprops/action-gh-release@v2
        if: steps.check.outputs.is_first == 'false'
        with:
          generate_release_notes: true
          files: dist/*
