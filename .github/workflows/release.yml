name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/monitor/pnpm-lock.yaml

      - name: Build monitor UI
        run: |
          pnpm --dir web/monitor install --frozen-lockfile
          pnpm --dir web/monitor build

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=${arch} \
              go build -trimpath \
              -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
              -o dist/singbox-deploy-linux-${arch} ./cmd/singbox-deploy
          done
          cp scripts/install.sh dist/install.sh

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
